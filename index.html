<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ORBIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Inter',sans-serif;touch-action:none}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#gc{z-index:1}#fx{z-index:2}
#ui{position:fixed;z-index:10;inset:0;pointer-events:none;display:flex;flex-direction:column;align-items:center}
#title{
  margin-top:max(28px,env(safe-area-inset-top,28px));
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(22px,5vw,36px);letter-spacing:.14em;color:#fff;
  text-shadow:0 0 20px rgba(255,85,15,.7),0 0 50px rgba(255,35,0,.28)}
#mission{
  font-family:'Inter',sans-serif;font-weight:300;
  font-size:clamp(9px,2vw,12px);letter-spacing:.38em;
  color:#ff8844;margin-top:8px;opacity:.7;text-transform:uppercase}
#lvlbar{margin-top:16px;display:flex;gap:8px;align-items:center}
#hint{
  position:fixed;bottom:max(38px,env(safe-area-inset-bottom,38px));
  font-family:'Orbitron',sans-serif;font-weight:400;
  font-size:clamp(10px,2.4vw,13px);letter-spacing:.26em;
  color:#fff;opacity:.75;transition:opacity .4s;
  animation:hintPulse 2.8s ease-in-out infinite}
#telem{
  position:fixed;top:max(18px,env(safe-area-inset-top,18px));
  right:max(18px,env(safe-area-inset-right,18px));
  text-align:right;font-family:'Orbitron',sans-serif;font-weight:400;
  font-size:10px;letter-spacing:.06em;color:#ff7733;
  opacity:0;transition:opacity .6s;line-height:2;
  padding:10px 14px 10px 18px;
  border-left:1px solid rgba(255,110,30,.3);
  border-bottom:1px solid rgba(255,110,30,.12);
  background:rgba(0,0,0,.3)}
#result{
  position:fixed;z-index:20;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .45s;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}
#rcard{
  display:flex;flex-direction:column;align-items:center;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);
  padding:clamp(36px,7vw,56px) clamp(40px,8vw,72px);
  min-width:clamp(250px,52vw,380px)}
#ricon{font-size:50px;margin-bottom:18px;line-height:1}
#rtxt{
  font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:clamp(17px,4.2vw,26px);letter-spacing:.18em;
  color:#fff;margin-bottom:10px;text-align:center}
#rsub{
  font-family:'Inter',sans-serif;font-weight:300;
  font-size:clamp(10px,2vw,12px);letter-spacing:.2em;
  color:rgba(255,255,255,.45);margin-bottom:38px;text-align:center}
#rbtn{
  pointer-events:all;
  font-family:'Orbitron',sans-serif;font-weight:400;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.75);
  font-size:11px;letter-spacing:.3em;
  padding:14px 38px;cursor:pointer;
  transition:all .2s;outline:none;-webkit-tap-highlight-color:transparent}
#rbtn:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.38);color:#fff}
#rbtn:active{transform:scale(.96)}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{text-shadow:0 0 12px #0f6,0 0 28px #0f6}50%{text-shadow:0 0 24px #0f6,0 0 60px #0f6,0 0 110px #0f6}}
@keyframes rise{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes hintPulse{0%,100%{opacity:.55}50%{opacity:.88}}
@keyframes cardIn{from{transform:translateY(22px) scale(.97);opacity:0}to{transform:none;opacity:1}}
.v-pop{animation:pop .55s cubic-bezier(.2,1.5,.4,1) forwards}
.v-glow{animation:glow 1.6s ease-in-out infinite}
.v-rise{animation:rise .5s .28s ease both}
.v-btn{animation:rise .5s .48s ease both;border-color:rgba(0,255,100,.5)!important;color:#0f6!important}
.v-card{animation:cardIn .38s cubic-bezier(.25,.8,.25,1) both}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<canvas id="fx"></canvas>
<div id="ui">
  <div id="title">ORBIT</div>
  <div id="mission">LAUNCH WINDOW</div>
  <div id="lvlbar" style="margin-top:10px;display:flex;gap:8px"></div>
</div>
<div id="hint">TAP TO LAUNCH</div>
<div id="telem"></div>
<div id="result">
  <div id="rcard">
    <div id="ricon"></div>
    <div id="rtxt"></div>
    <div id="rsub"></div>
    <button id="rbtn">RETRY</button>
  </div>
</div>
<script>
const gc=document.getElementById('gc'),fx=document.getElementById('fx');
const g=gc.getContext('2d'),f=fx.getContext('2d');
const hint=document.getElementById('hint'),telem=document.getElementById('telem');
const result=document.getElementById('result'),ricon=document.getElementById('ricon');
const rtxt=document.getElementById('rtxt'),rsub=document.getElementById('rsub');

let W,H,starCvs;

function resize(){
  W=gc.width=fx.width=window.innerWidth;
  H=gc.height=fx.height=window.innerHeight;
  buildStars();buildCloudCvs();buildClouds();buildVig();buildMtns();
}
window.addEventListener('resize',resize);

function buildStars(){
  starCvs=document.createElement('canvas');
  starCvs.width=W;starCvs.height=H;
  const sc=starCvs.getContext('2d');
  for(let i=0;i<220;i++){
    const x=Math.random()*W,y=Math.random()*H*.9,r=Math.random()*1.4+.3;
    sc.beginPath();sc.arc(x,y,r,0,7);
    sc.fillStyle=`rgba(255,255,255,${.3+Math.random()*.7})`;sc.fill();
  }
}
function buildMtns(){
  mtnData=[];
  // 3 Ebenen: fern (hell), mittel, nah (dunkel) — jeweils andere Parallax-Geschwindigkeit
  [[7,.11,'rgba(50,65,98,.26)',.16],[4,.26,'rgba(14,25,46,.54)',.43],[3,.40,'rgba(4,8,18,.82)',.76]]
  .forEach(([n,hf,col,sf])=>{
    const bumps=[];
    for(let i=0;i<n;i++){
      bumps.push({
        cx:W*(i+0.5+(Math.random()-.5)*.5)/n,
        h:H*hf*(.50+Math.random()*.50),
        w:W*(.13+Math.random()*.09)/n*1.9
      });
    }
    mtnData.push({bumps,col,sf});
  });
}
function drawMtns(){
  const vis=clamp(1-alt/.30,0,1);
  if(vis<=0)return;
  g.save();g.globalAlpha=vis;
  mtnData.forEach(({bumps,col,sf})=>{
    const base=H*.74+(gy-H*.74)*sf;
    g.beginPath();
    g.moveTo(-10,H+10);g.lineTo(-10,base);
    let lastX=-10;
    bumps.forEach(({cx,h,w})=>{
      if(lastX<cx-w)g.lineTo(cx-w,base);
      g.quadraticCurveTo(cx,base-h,cx+w,base);
      lastX=cx+w;
    });
    g.lineTo(W+10,base);g.lineTo(W+10,H+10);
    g.closePath();g.fillStyle=col;g.fill();
  });
  g.globalAlpha=1;g.restore();
}
function buildVig(){
  vigCvs=document.createElement('canvas');
  vigCvs.width=W;vigCvs.height=H;
  const vc=vigCvs.getContext('2d');
  const vg=vc.createRadialGradient(W/2,H/2,Math.min(W,H)*.22,W/2,H/2,Math.min(W,H)*.88);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.62)');
  vc.fillStyle=vg;vc.fillRect(0,0,W,H);
}
function buildCloudCvs(){
  cloudCvs=document.createElement('canvas');
  cloudCvs.width=cloudCvs.height=128;
  const ctx=cloudCvs.getContext('2d');
  const gr=ctx.createRadialGradient(64,64,0,64,64,64);
  gr.addColorStop(0,'rgba(255,255,255,.90)');
  gr.addColorStop(.4,'rgba(250,253,255,.58)');
  gr.addColorStop(.72,'rgba(240,248,255,.18)');
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,128,128);
}
function buildClouds(){
  clouds=[];
  // cumulus: kompaktes Band alt 0.22–0.36 — zieht schnell vorbei
  for(let i=0;i<22;i++)
    clouds.push({x:-W*.10+Math.random()*W*1.2,altPos:.22+Math.random()*.14,r:W*(.042+Math.random()*.072),a:.30+Math.random()*.40,ci:false});
  // cirrus: alt 0.34–0.42, dünne Streifen
  for(let i=0;i<5;i++)
    clouds.push({x:Math.random()*W,altPos:.34+Math.random()*.08,r:W*(.10+Math.random()*.16),a:.10+Math.random()*.14,ci:true});
}

const LVLS=[{gw:58,spd:1.2},{gw:36,spd:1.65},{gw:20,spd:2.1}];
let level=0;
let state='idle',alt=0,flightT=0,fDur=1,ang=0,rSpd=LVLS[0].spd,ok=false;
let pts=[],streaks=[],fTrig=false,lastT=0,armFold=0,tilt=0,exhaust=0,gy=0,ry=0,flash=0,prevGy=0,dGy=0,atmBreak=false,atmShock=0;
let clouds=[],cloudCvs,vigCvs,mtnData=[];

function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function ease(t){return t<1?1-Math.pow(1-t,3):1}
function drawClouds(){
  if(alt>.46)return;
  g.save();
  clouds.forEach(c=>{
    const sy=ry-(c.altPos-alt)*H*5.0;
    if(sy<-c.r*3||sy>H+c.r*3)return;
    const d=Math.abs(c.altPos-alt);
    const raw=clamp(1-d*8.0,0,1);
    const fade=raw*raw*(3-2*raw); // smoothstep: kein Aufpoppen
    if(fade<=0)return;
    g.globalAlpha=c.a*fade;
    if(!c.ci){
      const s=c.r*2;g.drawImage(cloudCvs,c.x-s/2,sy-s/2,s,s);
    }else{
      const cg=g.createLinearGradient(c.x-c.r,sy,c.x+c.r,sy);
      cg.addColorStop(0,'rgba(0,0,0,0)');
      cg.addColorStop(.5,'rgba(238,248,255,1)');
      cg.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=cg;
      g.beginPath();g.ellipse(c.x,sy,c.r,c.r*.038,0,0,Math.PI*2);g.fill();
    }
  });
  g.globalAlpha=1;g.restore();
}

function launchEase(t){
  const P1=0.09;
  if(t<=P1) return 0;
  const s=(t-P1)/(1-P1);
  return s*s;
}
function lerpC(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t))}

function emit(type,x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    let vx,vy,decay,r;
    if(type==='trail'){
      vx=(-0.4+Math.random())*.9;
      vy=3.2+Math.random()*5.0;
      decay=.009+Math.random()*.009;r=0.9+Math.random()*1.6;
    } else if(type==='smk'){
      vx=(-0.5+Math.random())*1.2;vy=-.8-Math.random()*1.2;
      decay=.008+Math.random()*.006;r=8+Math.random()*12;
    } else if(type==='spark'){
      const spd=3+Math.random()*6;
      vx=Math.cos(a)*spd;vy=Math.sin(a)*spd;
      decay=.025+Math.random()*.03;r=2+Math.random()*2;
    } else { // fire (explosion)
      const spd=2+Math.random()*4;
      vx=Math.cos(a)*spd;vy=Math.sin(a)*spd;
      decay=.018+Math.random()*.015;r=4+Math.random()*5;
    }
    pts.push({type,x,y,vx,vy,decay,r,life:1});
  }
}
function emitRing(x,y){pts.push({type:'ring',x,y,r:0,life:1,decay:.022});}

function tickPts(dt){
  f.clearRect(0,0,W,H);
  for(let i=pts.length-1;i>=0;i--){
    const p=pts[i];p.life-=p.decay*dt/16.67;
    if(p.life<=0){pts.splice(i,1);continue;}
    if(p.type==='ring'){
      p.r+=7*dt/16.67;
      f.beginPath();f.arc(p.x,p.y,p.r,0,7);
      f.strokeStyle=`rgba(255,200,60,${p.life*.55})`;f.lineWidth=2;f.stroke();
      continue;
    }
    p.x+=p.vx*dt/16.67;p.y+=p.vy*dt/16.67;
    if(p.worldBound){
      p.y+=dGy;
      if(p.y<gy-H*.30){p.decay+=.025*dt/16.67;p.vy+=.05*dt/16.67;}
    }
    if(p.type==='smk'){p.r+=.13*dt/16.67;p.vy*=Math.pow(.975,dt/16.67);}
    if(p.type==='fire')p.vy-=.12*dt/16.67;
    if(p.type==='trail'){p.vy*=Math.pow(.975,dt/16.67);p.vx+=(Math.random()-.5)*.08;}
    if(p.type==='trail'){
      // elongated streak in direction of velocity
      const ang2=Math.atan2(p.vy,p.vx);
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      const len=p.r*(3.5+spd*.55);
      f.save();f.translate(p.x,p.y);f.rotate(ang2);
      const a2=p.life;
      f.fillStyle=p.life>.6?`rgba(255,252,210,${a2*.92})`:p.life>.32?`rgba(255,140,30,${a2*.78})`:`rgba(255,55,8,${a2*.5})`;
      f.beginPath();f.ellipse(0,0,Math.max(.5,p.r*.42),len,0,0,7);f.fill();
      f.restore();
    } else {
      f.beginPath();f.arc(p.x,p.y,Math.max(.1,p.r),0,7);
      if(p.type==='smk')f.fillStyle=p.dark?`rgba(55,48,42,${p.life*.58})`:`rgba(175,168,158,${p.life*.48})`;
      else f.fillStyle=p.green?`rgba(0,255,100,${p.life*.9})`:p.life>.5?`rgba(255,220,60,${p.life*.85})`:`rgba(255,80,20,${p.life*.7})`;
      f.fill();
    }
  }
}

function tickStreaks(dt){
  if(alt>.22&&Math.random()<(alt-.22)*.55){
    streaks.push({x:Math.random()*W,y:-20,len:15+Math.random()*55,spd:10+Math.random()*14+alt*18});
  }
  g.save();
  for(let i=streaks.length-1;i>=0;i--){
    const s=streaks[i];s.y+=s.spd*dt/16.67;
    if(s.y>H+60){streaks.splice(i,1);continue;}
    g.strokeStyle=`rgba(255,255,255,${.08+alt*.18})`;g.lineWidth=1;
    g.beginPath();g.moveTo(s.x,s.y);g.lineTo(s.x,s.y+s.len);g.stroke();
  }
  g.restore();
}

function drawBg(){
  const a2=Math.pow(Math.max(0,(alt-.74)/.26),1.6);
  const t=lerpC([3,18,55],[1,1,8],a2),b=lerpC([55,125,205],[2,2,14],a2);
  const gr=g.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,`rgb(${t.join(',')})`);gr.addColorStop(1,`rgb(${b.join(',')})`);
  g.fillStyle=gr;g.fillRect(0,0,W,H);
  // horizon glow
  if(alt>.52&&alt<.99){
    const ha=clamp(Math.sin((alt-.52)/(.99-.52)*Math.PI)*.7,0,1);
    const hg=g.createLinearGradient(0,H*.35,0,H*.78);
    hg.addColorStop(0,'rgba(0,0,0,0)');
    hg.addColorStop(.45,`rgba(210,75,15,${ha*.48})`);
    hg.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=hg;g.fillRect(0,H*.35,W,H*.43);
  }
  if(alt>.84){g.globalAlpha=clamp((alt-.84)/.14,0,1);g.drawImage(starCvs,0,0);g.globalAlpha=1;}
  // aurora — alt 0.56–0.90
  if(alt>.56&&alt<.90){
    const aa=clamp(Math.sin((alt-.56)/(.90-.56)*Math.PI)*.65,0,1);
    for(let i=0;i<3;i++){
      const ax=W*(.10+i*.40+Math.sin(lastT*.0007+i*2.1)*.038);
      const ag=g.createLinearGradient(0,H*.06,0,H*.64);
      const gv=138+i*22,bv=98+i*32;
      ag.addColorStop(0,'rgba(0,0,0,0)');
      ag.addColorStop(.3,`rgba(12,${gv},${bv},${aa*.09})`);
      ag.addColorStop(.7,`rgba(8,${gv-12},${bv-18},${aa*.07})`);
      ag.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=ag;g.fillRect(ax-W*.13,H*.04,W*.26,H*.62);
    }
  }
  // Erd-Rand — alt 0.82–1.0
  if(alt>.82){
    const ea=clamp((alt-.82)/.16,0,1);
    const eg=g.createLinearGradient(0,H*.62,0,H);
    eg.addColorStop(0,'rgba(0,0,0,0)');
    eg.addColorStop(.55,`rgba(22,88,215,${ea*.18})`);
    eg.addColorStop(1,`rgba(12,55,180,${ea*.42})`);
    g.fillStyle=eg;g.fillRect(0,H*.60,W,H*.40);
    g.save();
    g.beginPath();g.arc(W/2,H+W*1.82,W*1.88,0,Math.PI*2);
    g.strokeStyle=`rgba(88,172,255,${ea*.42})`;g.lineWidth=2.5;g.stroke();
    g.restore();
  }
  // vignette — pre-baked offscreen canvas, no gradient creation per frame
  if(vigCvs)g.drawImage(vigCvs,0,0);
}

function drawGround(y){
  if(y>H+80)return;
  const gr=g.createLinearGradient(0,y-24,0,y+28);
  gr.addColorStop(0,'rgba(8,20,12,0)');gr.addColorStop(1,'#0b1510');
  g.fillStyle=gr;g.fillRect(0,y-24,W,52);
  g.fillStyle='#0b1510';g.fillRect(0,y+28,W,H);
  // concrete pad
  const px=W/2,pw=W*.11;
  g.fillStyle='#484850';g.fillRect(px-pw/2,y+18,pw,18);
  g.fillStyle='#363640';g.fillRect(px-pw/2,y+18,pw,3);
  // trench glow — engine heat
  const tg=g.createRadialGradient(px,y+20,0,px,y+20,pw*.4);
  tg.addColorStop(0,'rgba(255,120,20,.25)');tg.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=tg;g.fillRect(px-pw*.5,y+12,pw,16);
  g.fillStyle='#222';g.beginPath();g.ellipse(px,y+20,pw*.32,7,0,0,Math.PI);g.fill();
  drawPalm(px-W*.21,y+22,H*.11);
  drawPalm(px+W*.19,y+22,H*.09);
  drawPalm(px-W*.35,y+22,H*.13);
}

function drawPalm(x,y,h){
  g.strokeStyle='rgba(8,14,8,.95)';g.lineWidth=Math.max(2,h*.05);
  g.beginPath();g.moveTo(x,y);
  g.bezierCurveTo(x+h*.1,y-h*.4,x-h*.05,y-h*.7,x+h*.08,y-h);g.stroke();
  const tx=x+h*.08,ty=y-h;
  g.lineWidth=Math.max(1.5,h*.018);
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2,len=h*.4;
    const cx2=tx+Math.cos(a)*len*.35,cy2=ty+Math.sin(a)*len*.25-len*.07;
    const ex=tx+Math.cos(a)*len,ey=ty+Math.sin(a)*len*.44-len*.13;
    g.strokeStyle=`rgba(6,14,6,${.8+.2*Math.abs(Math.sin(i*1.4))})`;
    g.beginPath();g.moveTo(tx,ty);g.quadraticCurveTo(cx2,cy2,ex,ey);g.stroke();
  }
}

function drawTower(cx,y,fold){
  const base=y+22,th=H*.22,top=base-th;
  const lx=cx-W*.052,rx=cx-W*.006;
  const cw=Math.max(3,W*.007);

  // diagonal bracing (subtle, behind columns)
  g.strokeStyle='rgba(25,25,38,.9)';g.lineWidth=Math.max(1,W*.0018);
  for(let i=0;i<5;i++){
    const y0=base-th*(i/5),y1=base-th*((i+1)/5);
    g.beginPath();g.moveTo(i%2?lx:rx,y0);g.lineTo(i%2?rx:lx,y1);g.stroke();
  }

  // horizontal platforms
  const bh=Math.max(2,H*.007);
  for(let i=0;i<=5;i++){
    const by=base-th*(i/5);
    g.fillStyle='#0d0d16';
    g.fillRect(lx-cw*.5,by-bh*.5,rx-lx+cw,bh);
    g.strokeStyle='rgba(50,50,72,.6)';g.lineWidth=.6;
    g.strokeRect(lx-cw*.5,by-bh*.5,rx-lx+cw,bh);
  }

  // main columns (solid black rectangles)
  [lx,rx].forEach(x=>{
    g.fillStyle='#0a0a14';
    g.fillRect(x-cw/2,top,cw,th+4);
    g.strokeStyle='rgba(55,55,80,.55)';g.lineWidth=.8;
    g.strokeRect(x-cw/2,top,cw,th+4);
    // edge highlight
    g.fillStyle='rgba(80,80,110,.18)';
    g.fillRect(x+cw/2-2,top,1.5,th);
  });

  // Mechazilla catching arm (rectangular, like SpaceX)
  const armY=top+H*.04,armLen=W*.072,armH=Math.max(4,H*.013);
  g.save();g.translate(rx,armY);g.rotate(-fold*1.18);
  g.fillStyle='#0b0b18';
  g.fillRect(0,-armH/2,armLen,armH);
  // arm segments
  g.fillStyle='rgba(40,40,60,.8)';
  g.fillRect(armLen*.35,-armH/2,W*.002,armH);
  g.fillRect(armLen*.7,-armH/2,W*.002,armH);
  // claw tip
  g.fillStyle='#0d0d1e';
  g.fillRect(armLen-4,-armH,4,armH*2);
  g.strokeStyle='rgba(60,60,90,.7)';g.lineWidth=.8;
  g.strokeRect(0,-armH/2,armLen,armH);
  g.restore();

  // nav blink light
  const blink=.45+.55*Math.sin(lastT*.0028);
  g.beginPath();g.arc(lx,top+3,2.5,0,7);
  g.fillStyle=`rgba(255,50,50,${blink})`;g.fill();
}

function drawRocket(cx,cy,t,exh){
  g.save();g.translate(cx,cy);g.rotate(t);
  const rw=(W<600?W*.030:W*.022),rh=H*.24;

  // aft flaps (smaller)
  const fy=-rh*.08;
  [[-1],[1]].forEach(s=>{
    g.beginPath();
    g.moveTo(s*rw*.95,fy);g.lineTo(s*rw*2.2,fy+rh*.18);
    g.lineTo(s*rw*1.9,fy+rh*.28);g.lineTo(s*rw*.95,fy+rh*.22);
    g.closePath();
    const fd=g.createLinearGradient(s*rw,fy,s*rw*2.2,fy+rh*.22);
    fd.addColorStop(0,'#888898');fd.addColorStop(1,'#50505e');
    g.fillStyle=fd;g.fill();
  });

  // main body — stainless steel cylinder
  g.beginPath();
  g.moveTo(-rw,-rh*.78);g.lineTo(-rw,rh*.15);g.lineTo(rw,rh*.15);g.lineTo(rw,-rh*.78);g.closePath();
  g.fillStyle='#9898a8';g.fill();
  // zentrierter Reflexionsstreifen — symmetrisch, beide Seiten gleich
  const sp=g.createLinearGradient(-rw*.18,0,rw*.18,0);
  sp.addColorStop(0,'rgba(255,255,255,0)');
  sp.addColorStop(.5,'rgba(255,255,255,.22)');
  sp.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=sp;g.fillRect(-rw*.18,-rh*.78,rw*.36,rh*.93);

  // tank separation rings — horizontale Strukturlinien
  [-0.52,-0.16,0.24].forEach(yf=>{
    g.beginPath();g.moveTo(-rw,rh*yf);g.lineTo(rw,rh*yf);
    g.strokeStyle='rgba(0,0,0,.55)';g.lineWidth=2;g.stroke();
    g.beginPath();g.moveTo(-rw,rh*yf+2);g.lineTo(rw,rh*yf+2);
    g.strokeStyle='rgba(255,255,255,.22)';g.lineWidth=1;g.stroke();
  });


  // nose cap
  g.beginPath();
  g.moveTo(-rw,-rh*.78);
  g.bezierCurveTo(-rw,-rh*.9,-rw*.55,-rh*.97,0,-rh);
  g.bezierCurveTo(rw*.55,-rh*.97,rw,-rh*.9,rw,-rh*.78);g.closePath();
  const nc=g.createLinearGradient(-rw*.4,-rh,rw*.4,-rh*.76);
  nc.addColorStop(0,'#7a7a8c');nc.addColorStop(.5,'#d2d2e0');nc.addColorStop(1,'#a0a0b0');
  g.fillStyle=nc;g.fill();
  // nose glint — Reflexionspunkt oben rechts am Nasenkegel
  const ng=g.createRadialGradient(rw*.22,-rh*.90,0,rw*.22,-rh*.90,rw*.72);
  ng.addColorStop(0,'rgba(255,255,255,.38)');ng.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=ng;
  g.beginPath();
  g.moveTo(-rw,-rh*.78);
  g.bezierCurveTo(-rw,-rh*.9,-rw*.55,-rh*.97,0,-rh);
  g.bezierCurveTo(rw*.55,-rh*.97,rw,-rh*.9,rw,-rh*.78);g.closePath();
  g.fill();

  // forward canards (small, near nose)
  const cy2=-rh*.58;
  [[-1],[1]].forEach(s=>{
    g.beginPath();
    g.moveTo(s*rw*.95,cy2);g.lineTo(s*rw*1.8,cy2+rh*.09);
    g.lineTo(s*rw*1.6,cy2+rh*.16);g.lineTo(s*rw*.95,cy2+rh*.12);
    g.closePath();
    g.fillStyle='#8888a0';g.fill();
    g.strokeStyle='rgba(255,255,255,.12)';g.lineWidth=.8;
    g.beginPath();g.moveTo(s*rw*.95,cy2+rh*.05);g.lineTo(s*rw*2.3,cy2+rh*.16);g.stroke();
  });

  // engine skirt
  g.beginPath();
  g.moveTo(-rw,rh*.15);g.lineTo(-rw*1.22,rh*.25);g.lineTo(rw*1.22,rh*.25);g.lineTo(rw,rh*.15);g.closePath();
  g.fillStyle='#363644';g.fill();

  // 3 Raptor bells
  [-.52,0,.52].forEach(bx=>{
    g.beginPath();g.ellipse(bx*rw,rh*.25,rw*.26,rh*.032,0,0,7);
    g.fillStyle='#1e1e2e';g.fill();
    g.strokeStyle='#484860';g.lineWidth=1;g.stroke();
  });
  // engine bell inner glow — leuchten beim Zünden
  if(exh>.08){
    [-.52,0,.52].forEach(bx=>{
      const ig=g.createRadialGradient(bx*rw,rh*.258,0,bx*rw,rh*.258,rw*.22);
      ig.addColorStop(0,`rgba(255,210,80,${exh*.85})`);
      ig.addColorStop(.55,`rgba(255,100,20,${exh*.40})`);
      ig.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=ig;
      g.beginPath();g.ellipse(bx*rw,rh*.258,rw*.22,rh*.026,0,0,7);g.fill();
    });
  }
  // flame-lit body — Flammen-Reflexion auf dem Körper
  if(exh>.04){
    const fb=g.createLinearGradient(0,-rh*.05,0,rh*.15);
    fb.addColorStop(0,`rgba(255,120,30,0)`);
    fb.addColorStop(1,`rgba(255,85,15,${exh*.28})`);
    g.fillStyle=fb;g.fillRect(-rw,-rh*.05,rw*2,rh*.20);
  }

  // flame — comet tail
  if(exh>.01){
    const ey=rh*.25;
    const floorDist=gy-(cy+ey);
    const flNatural=rh*(.75+exh*1.9);
    const fl=Math.min(flNatural,Math.max(0,floorDist-4));
    const flAlpha=clamp(floorDist/(rh*.5),0,1);
    const fw=rw*.65;
    g.globalAlpha=flAlpha;
    // outer glow
    const fo=g.createLinearGradient(0,ey,0,ey+fl*.9);
    fo.addColorStop(0,'rgba(255,140,30,.28)');fo.addColorStop(1,'rgba(255,40,0,0)');
    g.fillStyle=fo;
    g.beginPath();g.moveTo(-rw,ey);
    g.quadraticCurveTo(-fw*1.6,ey+fl*.45,0,ey+fl);
    g.quadraticCurveTo(fw*1.6,ey+fl*.45,rw,ey);g.closePath();g.fill();
    // mid flame
    const fm=g.createLinearGradient(0,ey,0,ey+fl*.82);
    fm.addColorStop(0,'rgba(255,210,80,.95)');fm.addColorStop(.4,'rgba(255,120,28,.72)');fm.addColorStop(1,'rgba(255,40,0,0)');
    g.fillStyle=fm;
    g.beginPath();g.moveTo(-fw*.92,ey);
    g.quadraticCurveTo(-fw*.38,ey+fl*.55,0,ey+fl*.88);
    g.quadraticCurveTo(fw*.38,ey+fl*.55,fw*.92,ey);g.closePath();g.fill();
    // bright inner core
    const fc=g.createLinearGradient(0,ey,0,ey+fl*.52);
    fc.addColorStop(0,'rgba(230,248,255,.99)');fc.addColorStop(.25,'rgba(255,255,200,.95)');fc.addColorStop(1,'rgba(255,200,70,0)');
    g.fillStyle=fc;
    g.beginPath();g.moveTo(-fw*.38,ey);
    g.quadraticCurveTo(-fw*.13,ey+fl*.34,0,ey+fl*.52);
    g.quadraticCurveTo(fw*.13,ey+fl*.34,fw*.38,ey);g.closePath();g.fill();
    // shock diamond — bright ellipse at nozzle exit, only during flight
    if(exh>.3){
      const sd=g.createRadialGradient(0,ey+rh*.08,0,0,ey+rh*.08,fw*.45);
      sd.addColorStop(0,'rgba(255,255,255,.55)');sd.addColorStop(1,'rgba(255,220,100,0)');
      g.fillStyle=sd;
      g.beginPath();g.ellipse(0,ey+rh*.08,fw*.45,rh*.18,0,0,Math.PI*2);g.fill();
    }
    g.globalAlpha=1;
  }
  g.restore();
}


const GS=82;
let GW=LVLS[0].gw;

const lvlbar=document.getElementById('lvlbar');
function renderLvlBar(){
  lvlbar.innerHTML='';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    const done=i<level,active=i===level;
    d.style.cssText=`width:${active?38:24}px;height:3px;border-radius:2px;transition:all .45s cubic-bezier(.4,0,.2,1);background:${done?'rgba(255,115,25,.95)':active?'rgba(255,210,70,1)':'rgba(255,255,255,.13)'}`;
    if(active)d.style.boxShadow='0 0 8px rgba(255,200,60,.7)';
    lvlbar.appendChild(d);
  }
}
function drawRing(){
  const cx=W/2,cy=H*.46,R=Math.min(W,H)*.17;
  // tick marks
  for(let i=0;i<24;i++){
    const ta=(i*15-90)*Math.PI/180;
    const major=i%6===0,minor=i%3===0;
    const r1=R*1.08,r2=R*(major?.88:minor?.93:.97);
    g.beginPath();
    g.moveTo(cx+Math.cos(ta)*r1,cy+Math.sin(ta)*r1);
    g.lineTo(cx+Math.cos(ta)*r2,cy+Math.sin(ta)*r2);
    g.strokeStyle=`rgba(255,255,255,${major?.22:minor?.12:.06})`;
    g.lineWidth=major?1.5:minor?.8:.5;g.stroke();
  }
  // outer track
  g.beginPath();g.arc(cx,cy,R,0,Math.PI*2);
  g.strokeStyle='rgba(255,255,255,.15)';g.lineWidth=R*.082;g.stroke();
  // green launch window
  const gs=(GS-90)*Math.PI/180,ge=gs+GW*Math.PI/180;
  g.beginPath();g.arc(cx,cy,R,gs,ge);
  g.strokeStyle='rgba(20,255,80,.95)';g.lineWidth=R*.086;g.stroke();
  // indicator dot
  const inZone=ang>=GS&&ang<=GS+GW;
  const ia=(ang-90)*Math.PI/180;
  const bx=cx+Math.cos(ia)*R,by=cy+Math.sin(ia)*R;
  g.save();
  if(inZone){g.shadowColor='rgba(0,255,100,1)';g.shadowBlur=10;}
  else{g.shadowColor='rgba(255,255,255,.4)';g.shadowBlur=4;}
  g.beginPath();g.arc(bx,by,R*.095,0,7);
  g.fillStyle=inZone?'#22ff66':'#fff';g.fill();
  g.shadowBlur=0;g.restore();
  // center text
  g.textAlign='center';g.textBaseline='middle';
  g.fillStyle='rgba(255,255,255,.5)';
  g.font=`700 ${Math.round(R*.115)}px 'Orbitron',monospace`;
  g.fillText('LAUNCH',cx,cy-R*.13);
  g.fillStyle=`rgba(255,150,55,${.42+Math.sin(lastT*.007)*.1})`;
  g.font=`400 ${Math.round(R*.088)}px 'Orbitron',monospace`;
  g.fillText(`LVL ${level+1}`,cx,cy+R*.15);
}

function drawAtmBreak(){
  const a=clamp(atmShock,0,1),ease=a*a;
  const rp=1-a; // ring progress 0→1
  g.save();
  // outer shockwave ring
  const rr=rp*Math.min(W,H)*.72;
  if(rr>1){
    g.beginPath();g.arc(W/2,ry,rr,0,Math.PI*2);
    g.strokeStyle=`rgba(140,215,255,${ease*.7})`;
    g.lineWidth=Math.max(.5,(1-rp)*18);g.stroke();
  }
  // inner ring (slightly smaller / faster)
  const rr2=rp*Math.min(W,H)*.48;
  if(rr2>1){
    g.beginPath();g.arc(W/2,ry,rr2,0,Math.PI*2);
    g.strokeStyle=`rgba(200,240,255,${ease*.45})`;
    g.lineWidth=Math.max(.5,(1-rp)*10);g.stroke();
  }
  // horizontal plasma band across screen
  const bh=H*.055*(1+rp*.4);
  const bg=g.createLinearGradient(0,ry-bh,0,ry+bh*1.8);
  bg.addColorStop(0,'rgba(0,0,0,0)');
  bg.addColorStop(.45,`rgba(100,195,255,${ease*.24})`);
  bg.addColorStop(.55,`rgba(130,215,255,${ease*.24})`);
  bg.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=bg;g.fillRect(0,ry-bh,W,bh*2.8);
  // radial edge glow
  g.globalAlpha=ease*.2;
  const eg=g.createRadialGradient(W/2,ry,H*.03,W/2,ry,H*.65);
  eg.addColorStop(0,'rgba(0,0,0,0)');
  eg.addColorStop(1,'rgba(160,228,255,1)');
  g.fillStyle=eg;g.fillRect(0,0,W,H);
  g.globalAlpha=1;g.restore();
}

function smokeWave(intensity){
  const n=Math.round(90*intensity);
  for(let i=0;i<n;i++){
    const spread=W*(.22+Math.random()*.12);
    const side=Math.random()<.5?-1:1;
    const jet=Math.random()<.38;
    pts.push({type:'smk',worldBound:true,
      x:W/2+(-.5+Math.random())*spread,
      y:H*.73+Math.random()*18,
      vx:jet?side*(5+Math.random()*5.5):(-.5+Math.random())*2.8,
      vy:jet?(.04-Math.random()*.12):(-0.08-Math.random()*.22),
      life:1,
      decay:(.0018+Math.random()*.0016)*intensity,
      r:(jet?32+Math.random()*28:46+Math.random()*58)*Math.max(.5,intensity),
      dark:Math.random()<.3
    });
  }
}

function trigger(){
  if(state!=='ready'||fTrig)return;
  fTrig=true;ok=(ang>=GS&&ang<=GS+GW);state='launching';
  hint.style.opacity='0';telem.style.opacity='1';flash=.7;
  emitRing(W/2,H*.46);
  for(let i=0;i<24;i++){emit('trail',W/2,H*.74,2);}
  for(let i=0;i<12;i++)emit('spark',W/2,H*.73,1);
  emitRing(W/2,H*.76); // ground shockwave
  smokeWave(1.0);
  setTimeout(()=>smokeWave(.7),320);
  setTimeout(()=>smokeWave(.4),700);
  fDur=ok?16500:2800;flightT=0;exhaust=0;armFold=0;streaks=[];atmBreak=false;atmShock=0;
}

function applyLevel(){
  GW=LVLS[level].gw;
  rSpd=LVLS[level].spd+(Math.random()-.5)*.15;
  renderLvlBar();
}

function doReset(keepLevel){
  if(!keepLevel)level=0;
  applyLevel();
  state='idle';alt=0;flightT=0;ang=0;
  ok=false;fTrig=false;pts=[];streaks=[];exhaust=0;tilt=0;armFold=0;flash=0;prevGy=H*.74;dGy=0;atmBreak=false;atmShock=0;
  result.style.opacity='0';result.style.pointerEvents='none';
  document.getElementById('rcard').className='';
  ricon.className='';rtxt.className='';rsub.className='';
  document.getElementById('rbtn').className='';
  rtxt.style.color='';rsub.style.color='';
  hint.style.opacity='1';telem.style.opacity='0';
  setTimeout(()=>state='ready',500);
}

document.getElementById('rbtn').addEventListener('click',()=>doReset(ok&&level<3));
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();trigger();}});
window.addEventListener('pointerdown',e=>{if(e.target.id==='rbtn')return;trigger();});

function showResult(){
  if(ok){
    level++;
    renderLvlBar();
    if(level>=3){
      ricon.textContent='✓';ricon.style.color='#0f6';
      rtxt.style.color='#0f6';rsub.style.color='#4fa';
      rtxt.textContent='MISSION COMPLETE';
      rsub.textContent='ALL THREE ORBITS ACHIEVED';
      document.getElementById('rbtn').textContent='PLAY AGAIN';
      ricon.className='v-pop';rtxt.className='v-pop';
      rsub.className='v-rise';document.getElementById('rbtn').className='v-btn';
      // firework burst on canvas
      for(let i=0;i<5;i++) setTimeout(()=>{
        const x=W*(.2+Math.random()*.6),y=H*(.15+Math.random()*.4);
        emitRing(x,y);
        for(let j=0;j<30;j++)emit('spark',x,y,1);
        for(let j=0;j<15;j++){
          pts[pts.length-1-j].vx*=1.4;
          pts[pts.length-1-j].vy*=1.4;
          // green tint via hue — reuse life as color flag
          pts[pts.length-1-j].green=true;
        }
      },i*220);
    } else {
      ricon.textContent='✓';ricon.style.color='#4ef';
      rtxt.textContent=`LEVEL ${level} COMPLETE`;
      rsub.textContent=`WINDOW NARROWING — STAY SHARP`;
      document.getElementById('rbtn').textContent='NEXT LEVEL';
    }
  } else {
    ricon.textContent='✕';ricon.style.color='#f44';
    rtxt.textContent='LAUNCH FAILURE';
    rsub.textContent='BACK TO LEVEL 1';
    document.getElementById('rbtn').textContent='RETRY';
  }
  document.getElementById('rcard').className='v-card';
  result.style.opacity='1';result.style.pointerEvents='all';
}

function loop(ts){
  requestAnimationFrame(loop);
  const dt=lastT?Math.min(ts-lastT,50):16.67;lastT=ts;

  g.clearRect(0,0,W,H);
  drawBg();

  if(state==='idle'||state==='ready'){
    gy=H*.74;ry=H*.64;
    drawMtns();drawGround(gy);drawTower(W/2,gy,0);drawRocket(W/2,ry,0,0);
    if(state==='ready'){ang=(ang+rSpd*dt/16.67)%360;drawRing();}
    tickPts(dt);return;
  }

  if(state==='launching'||state==='done'){
    if(state==='launching'){
      flightT=Math.min(flightT+dt,fDur);
      const prog=flightT/fDur;
      alt=launchEase(clamp(prog,0,1));
      if(ok&&!atmBreak&&alt>=0.74){
        atmBreak=true;atmShock=1.0;flash=0.5;
        emitRing(W/2,ry);
        for(let i=0;i<32;i++)emit('spark',W/2+(-0.5+Math.random())*80,ry+(-0.5+Math.random())*50,1);
        for(let i=0;i<16;i++)emit('trail',W/2,ry,1);
      }
      if(atmShock>0)atmShock=Math.max(0,atmShock-dt/900);
      armFold=clamp((prog-.04)*5,0,1);
      ry=lerp(H*.64,H*.52,Math.min(1,alt*1.9));
      // kontinuierlicher Bodenrauch
      if(prog<.38&&Math.random()<.50&&pts.length<450){
        const sx=W/2+(-0.5+Math.random())*W*.18;
        const fade=clamp(1-prog/.38,0,1);
        pts.push({type:'smk',worldBound:true,x:sx,y:gy+12,
          vx:(-1+Math.random()*2)*3.2,vy:-.05-Math.random()*.16,
          life:1,decay:(.0028+Math.random()*.002),
          r:(28+Math.random()*36)*(.4+fade*.6),
          dark:Math.random()<.28});
      }
      // Exhaust baut sich in den ersten 8% auf (Motorzündung)
      const warmup=clamp(prog/.08,0,1);
      const flicker=1+Math.sin(lastT*.045)*.12+Math.sin(lastT*.018)*.08;
      exhaust=(ok?clamp(1-prog*.95,0,1):clamp(1-(prog-.04)*2.5,0,1))*flicker*warmup;
      // tilt erst im späteren Flug (gravity turn)
      // tilt: sanft neigen, lang halten, sanft zurück
      const tProg=clamp((prog-.40)/.56,0,1);
      const tc=tProg<.28?tProg/.28:tProg>.72?(1-(tProg-.72)/.28):1;
      const ts=tc*tc*(3-2*tc); // smoothstep — kein Ruck an keiner Stelle
      tilt=ok?ts*.058:Math.sin(clamp((prog-.12)/.6,0,1)*Math.PI*1.8)*(prog*.2);
      // fire + smoke trail
      if(exhaust>.05&&Math.random()<.65){
        const ex=W/2+tilt*H*.05,ey=ry+H*.075;
        emit('trail',ex,ey,2);if(Math.random()<.3)emit('smk',ex,ey+10,1);
      }
      // explosion trigger
      if(!ok&&prog>.15&&exhaust<.04&&pts.filter(p=>p.type==='fire').length<5){
        flash=1;
        for(let i=0;i<70;i++)emit('fire',W/2,ry,1);
        for(let i=0;i<50;i++)emit('spark',W/2,ry,1);
        emit('smk',W/2,ry,24);emitRing(W/2,ry);
        setTimeout(()=>emitRing(W/2,ry+20),120);
      }
      const spd=ok?Math.round(alt*7800):Math.round(Math.max(0,(1-prog*2.2)*680));
      telem.innerHTML=`ALT&nbsp;&nbsp;${Math.round(alt*420)} km<br>SPD&nbsp;&nbsp;${spd} m/s<br>T+&nbsp;&nbsp;&nbsp;${(flightT/1000).toFixed(1)} s`;
      if(flightT>=fDur){state='done';setTimeout(showResult,ok?900:350);}
    }
    gy=H*.74+Math.pow(alt,.5)*H*2.2;
    dGy=gy-prevGy;prevGy=gy;
    tickStreaks(dt);
    drawMtns();
    drawGround(gy);
    if(gy<H+H*.28)drawTower(W/2,gy,Math.min(1,armFold));
    drawRocket(W/2,ry,tilt,exhaust);
    if(atmShock>0)drawAtmBreak();
    if(flash>0){g.fillStyle=`rgba(255,220,80,${flash*.35})`;g.fillRect(0,0,W,H);flash=Math.max(0,flash-.06*dt/16.67);}
    tickPts(dt);
  }
}

resize();
applyLevel();
setTimeout(()=>{state='ready';},400);
requestAnimationFrame(loop);
</script>
